name: Sync release
on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-release]

permissions:
  id-token: write
  contents: write
  actions: write
  attestations: write

env:
  GH_TOKEN: ${{ github.token }}
  SOURCE_REPO: 'ZG089/Re-Malwack'
  MODULE_NAME: 'Re-Malwack'

jobs:
  get_tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.check.outputs.tags }}
      latest: ${{ steps.check.outputs.latest }}
    steps:
      - name: Check tags
        id: check
        run: |
          SOURCE_TAGS=$(gh api repos/$SOURCE_REPO/tags | jq -r '.[].name' | sort)
          CURRENT_TAGS=$(gh api repos/$GITHUB_REPOSITORY/tags | jq -r '.[].name' | sort)
          MISSING=$(comm -23 <(echo "$SOURCE_TAGS") <(echo "$CURRENT_TAGS"))
          MISSING_JSON=$(echo "$MISSING" | jq -R -s -c 'split("\n")[:-1] | map(select(. != ""))')
          echo "tags=$MISSING_JSON" >> $GITHUB_OUTPUT
          LATEST=$(echo "$SOURCE_TAGS" | tail -1)
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  release:
    needs: get_tags
    if: needs.get_tags.outputs.tags != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ${{ fromJson(needs.get_tags.outputs.tags) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}

      - name: Pull release artifact and notes
        run: |
          echo "Looking for assets matching pattern..."
          gh release view ${{ matrix.tag }} --repo $SOURCE_REPO --json assets -q '.assets[].name'
          
          gh release download ${{ matrix.tag }} --repo $SOURCE_REPO --pattern "*.zip" --skip-existing
          
          # Capture the actual downloaded filename
          DOWNLOADED_FILE=$(ls *.zip 2>/dev/null | head -1)
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "ERROR: No .zip file found!"
            ls -la
            exit 1
          fi
          echo "Found and using: $DOWNLOADED_FILE"
          echo "DOWNLOADED_FILE=$DOWNLOADED_FILE" >> $GITHUB_ENV
          
          BODY=$(gh release view ${{ matrix.tag }} --repo $SOURCE_REPO --json body -q .body)
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: KernelSU-Modules-Repo/module_release@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ matrix.tag }}
          make_latest: ${{ matrix.tag == needs.get_tags.outputs.latest }}
          file: "${{ env.DOWNLOADED_FILE }}"
          body: ${{ env.RELEASE_BODY }}

      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: "${{ env.DOWNLOADED_FILE }}"
